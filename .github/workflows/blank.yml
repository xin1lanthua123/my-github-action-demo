name: hello world
on: 
  push:
    branches: 
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main 
    
jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Hello Step
        run: |
          echo " welcome to ghaction"
  goodbye:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: Hello Step
        run: |
          echo " say goodbye to ghaction"
          
        
