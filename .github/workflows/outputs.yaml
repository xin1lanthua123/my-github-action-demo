        steps:
         -  name: First stepp
            id: iloveyou
            run: |
             echo "version=0.0.1" >> $GITHUB_OUTPUT
         -  name: Second Step
            run: |
             echo "This version above is ${{steps.iloveyou.outputs.version}}"
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
         -  name: first Step
            run: |
             echo "This version of the app is ${{needs.build.outputs.version_at_job_level}}"
            
            
            
            